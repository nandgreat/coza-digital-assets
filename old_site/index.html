<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COZA Digital Service Assets</title>
  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f1d97a;
      --navy: #0b0f1f;
      --navy-2: #141a33;
      --white: #ffffff;
      --muted: #b9bdd1;
      --teal: #1a6b6b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, var(--navy-2) 0%, var(--navy) 60%);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-badge {
      width: 110px;
      height: 110px;
      margin: 0 auto 18px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 0 6px rgba(212, 175, 55, 0.15), 0 10px 30px rgba(212, 175, 55, 0.35);
    }

    .logo-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1.brand {
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 6px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── Views ── */
    .view {
      display: none;
      width: 100%;
      max-width: 800px;
      flex-direction: column;
      align-items: center;
    }

    .view.active {
      display: flex;
    }

    /* ── Category Grid ── */
    .category-grid {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 780px;
    }

    .cat-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 36px 16px;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
      transition: transform .25s, border-color .25s, box-shadow .25s;
      text-align: center;
      text-decoration: none;
      color: var(--white);
    }

    .cat-card:hover {
      transform: translateY(-6px);
      border-color: rgba(212, 175, 55, 0.55);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.4);
    }

    .cat-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .cat-label {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--white);
    }

    .cat-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Service List ── */
    .list-header {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      margin-bottom: 28px;
      margin-top: 36px;
    }

    .back-btn {
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.35);
      color: var(--gold-light);
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
    }

    .back-btn:hover {
      opacity: .8;
    }

    .list-title {
      font-size: clamp(18px, 3.5vw, 26px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .service-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .service-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px 24px;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      text-decoration: none;
      color: var(--white);
    }

    .service-item:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }

    .service-item-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .service-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .service-item-text h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .service-item-text .s-date {
      font-size: 13px;
      color: var(--gold-light);
    }

    .service-item-text .s-minister {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .arrow-btn {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--navy);
      border: none;
      padding: 9px 18px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity .2s;
    }

    .arrow-btn:hover {
      opacity: .85;
    }

    /* ── Coming Soon ── */
    .coming-soon {
      margin-top: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .coming-soon span {
      display: block;
      font-size: 40px;
      margin-bottom: 14px;
    }

    footer {
      margin-top: 50px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }

    footer strong {
      color: var(--gold-light);
    }

    @media(max-width:520px) {
      .category-grid {
        grid-template-columns: 1fr;
      }

      .service-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .arrow-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-badge"><img src="images/coza_logo.png" alt="COZA Logo"></div>
    <h1 class="brand">COZA</h1>
    <div class="tagline">Digital Service Assets</div>
  </header>

  <div class="category-grid">

    <a class="cat-card" href="sundays.html">
      <div class="cat-icon">☀️</div>
      <div class="cat-label">COZA Sundays</div>
      <div class="cat-sub">Sunday Service Resources</div>
    </a>

    <a class="cat-card" href="tuesdays.html">
      <div class="cat-icon">✨</div>
      <div class="cat-label">COZA Tuesdays</div>
      <div class="cat-sub">Tuesday Service Resources</div>
    </a>

    <a class="cat-card" href="7dg.html">
      <div class="cat-icon">🔥</div>
      <div class="cat-label">7DG</div>
      <div class="cat-sub">7 Days of Glory</div>
    </a>

  </div>

  <footer>
    &copy; 2026 COZA Digital Service Assets &middot; Commonwealth of Zion Assembly &middot; All rights reserved.<br><span style="margin-top:8px;display:inline-block;font-size:14px;">Powered by <strong style="color:var(--gold-light);">Witty Inventions</strong></span>
  </footer>

</body>

</html>
