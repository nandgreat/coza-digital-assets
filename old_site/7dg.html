<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7DG 2026 | Digital Service Assets</title>
<style>
  :root{--gold:#d4af37;--gold-light:#f1d97a;--navy:#0b0f1f;--navy-2:#141a33;--white:#ffffff;--muted:#b9bdd1;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Helvetica,Arial,sans-serif;background:radial-gradient(circle at top,var(--navy-2) 0%,var(--navy) 60%);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px;}
  .back-link{align-self:flex-start;width:100%;max-width:720px;margin:0 auto 24px;color:var(--gold-light);text-decoration:none;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .back-link:hover{opacity:.8;}
  header{text-align:center;margin-bottom:10px;}
  .logo-badge{width:90px;height:90px;margin:0 auto 14px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 5px rgba(212,175,55,0.15),0 8px 24px rgba(212,175,55,0.3);}
  .logo-badge img{width:100%;height:100%;object-fit:cover;display:block;}
  h1.brand{font-size:clamp(24px,4.5vw,38px);letter-spacing:6px;font-weight:800;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px;}
  .tagline{color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;}

  .page-header{width:100%;max-width:720px;margin-top:32px;}
  .edition-label{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .page-title{font-size:clamp(22px,4.5vw,34px);font-weight:800;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;text-align:left;}
  .divider{width:60px;height:3px;background:linear-gradient(135deg,var(--gold-light),var(--gold));border-radius:2px;margin:12px 0 32px;}

  .session-list{display:flex;flex-direction:column;gap:16px;width:100%;max-width:720px;}

  .session-item{display:flex;align-items:center;justify-content:space-between;gap:16px;background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:22px 26px;transition:transform .25s,border-color .25s,box-shadow .25s;text-decoration:none;color:var(--white);}
  .session-item:hover{transform:translateY(-4px);border-color:rgba(212,175,55,0.5);box-shadow:0 12px 28px rgba(0,0,0,0.35);}
  .session-info{display:flex;align-items:center;gap:16px;}
  .session-icon{width:52px;height:52px;border-radius:50%;background:rgba(212,175,55,0.14);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid rgba(212,175,55,0.25);}
  .session-text .day-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light);margin-bottom:4px;}
  .session-text h3{font-size:16px;font-weight:700;margin-bottom:3px;}
  .session-text .s-sub{font-size:12px;color:var(--muted);}

  .arrow-btn{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--navy);border:none;padding:10px 20px;border-radius:30px;font-weight:700;font-size:13px;cursor:pointer;text-decoration:none;white-space:nowrap;transition:opacity .2s;}
  .arrow-btn:hover{opacity:.85;}

  footer{margin-top:50px;text-align:center;color:var(--muted);font-size:12px;letter-spacing:1px;line-height:1.8;}
  footer strong{color:var(--gold-light);}
  @media(max-width:480px){.session-item{flex-direction:column;align-items:flex-start;gap:14px;}.arrow-btn{width:100%;text-align:center;}}
</style>
</head>
<body>

  <a class="back-link" href="index.html">← Back to Home</a>

  <header>
    <div class="logo-badge"><img src="images/coza_logo.png" alt="COZA Logo"></div>
    <h1 class="brand">COZA</h1>
    <div class="tagline">Digital Service Assets</div>
  </header>

  <div class="page-header">
    <div class="edition-label">🔥 Edition</div>
    <div class="page-title">7DG 2026</div>
    <div class="divider"></div>
  </div>

  <div class="session-list">

    <a class="session-item" href="service-7dg-day1-evening.html">
      <div class="session-info">
        <div class="session-icon">🌙</div>
        <div class="session-text">
          <div class="day-label">Day 1</div>
          <h3>Evening — Victory Night</h3>
          <div class="s-sub">Sermon Notes &middot; Blessings &middot; Quotes</div>
        </div>
      </div>
      <span class="arrow-btn">View →</span>
    </a>

  </div>

  <footer>
    &copy; 2026 COZA Digital Service Assets &middot; Commonwealth of Zion Assembly &middot; All rights reserved.<br>
    <span style="margin-top:8px;display:inline-block;font-size:14px;">Powered by <strong>Witty Inventions</strong></span>
  </footer>

</body>
</html>
